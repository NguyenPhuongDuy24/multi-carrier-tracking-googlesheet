<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f4f8;
    color: #2d3748;
    font-size: 13px;
    padding: 12px;
  }

  .header {
    background: linear-gradient(135deg, #e53e3e, #c53030);
    color: white;
    padding: 12px 14px;
    border-radius: 10px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header .icon { font-size: 20px; }
  .header h1 { font-size: 15px; font-weight: 700; }
  .header p  { font-size: 10px; opacity: 0.85; margin-top: 2px; }

  .card {
    background: white;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .card-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #718096;
    margin-bottom: 10px;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #4a5568;
    margin-bottom: 4px;
    margin-top: 10px;
  }
  label:first-of-type { margin-top: 0; }

  input, select {
    width: 100%;
    padding: 8px 10px;
    border: 1.5px solid #e2e8f0;
    border-radius: 7px;
    font-size: 12px;
    color: #2d3748;
    outline: none;
    transition: border-color 0.2s;
    background: white;
  }
  input:focus, select:focus { border-color: #e53e3e; }
  input::placeholder { color: #bbb; }

  .btn {
    width: 100%;
    padding: 9px;
    border: none;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-primary {
    background: linear-gradient(135deg, #e53e3e, #c53030);
    color: white;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-secondary { background: #edf2f7; color: #4a5568; }
  .btn-secondary:hover { background: #e2e8f0; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  .hint {
    font-size: 10px;
    color: #718096;
    text-align: center;
    margin: 6px 0 2px;
    line-height: 1.5;
  }

  .toast {
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 600;
    margin-top: 10px;
    display: none;
    align-items: center;
    gap: 6px;
    line-height: 1.4;
  }
  .toast.success { background: #c6f6d5; color: #276749; display: flex; }
  .toast.error   { background: #fed7d7; color: #9b2c2c; display: flex; }
  .toast.info    { background: #bee3f8; color: #2a69ac; display: flex; }

  .spinner {
    width: 13px; height: 13px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
    flex-shrink: 0;
  }
  .spinner-dark {
    border-color: rgba(0,0,0,0.15);
    border-top-color: #4a5568;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .custom-select { position: relative; width: 100%; }
  .select-selected {
    width: 100%; padding: 8px 10px; border: 1.5px solid #e2e8f0; border-radius: 7px;
    font-size: 12px; background: white; cursor: pointer; display: flex; justify-content: space-between;
    align-items: center; color: #2d3748; transition: border-color 0.2s;
  }
  .select-selected:after { content: "▼"; font-size: 10px; color: #718096; }
  .select-items {
    position: absolute; background: white; top: 100%; left: 0; right: 0; z-index: 99;
    border: 1px solid #e2e8f0; border-radius: 7px; margin-top: 4px;
    max-height: 220px; overflow-y: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  .select-hide { display: none; }
  .select-items .option {
    padding: 8px 10px; cursor: pointer; font-size: 12px; border-bottom: 1px solid #f7fafc;
  }
  .select-items .option:last-child { border-bottom: none; }
  .select-items .option:hover { background: #edf2f7; color: #c53030; font-weight: 600; }
  .search-box {
    position: sticky; top: 0; background: white; padding: 6px; border-bottom: 1px solid #e2e8f0; z-index: 100;
  }
  .search-box input {
    width: 100%; padding: 6px 8px; border: 1px solid #cbd5e0; border-radius: 5px;
    font-size: 12px; outline: none; margin: 0;
  }
  .search-box input:focus { border-color: #e53e3e; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="icon">🚚</div>
  <div>
    <h1>17TRACK Tracker</h1>
    <p>Quản lý đa đơn hàng vận chuyển</p>
  </div>
</div>

<!-- Cài đặt API Key -->
<div class="card">
  <div class="card-title">⚙️ Cài đặt hệ thống</div>
  <label>API Key 17TRACK</label>
  <input type="password" id="apiKeyInput" placeholder="Nhập API Key vào đây...">
  <button class="btn btn-secondary" id="btnSaveKey" onclick="saveApiKey()">
    <span id="keyIcon">💾</span>
    <span id="keyText">Lưu API Key</span>
    <div class="spinner spinner-dark" id="keySpinner"></div>
  </button>
  <div class="toast" id="toastKey"></div>
</div>

<!-- Thêm đơn hàng -->
<div class="card">
  <div class="card-title">➕ Thêm & Tra cứu nhanh</div>

  <label>Mã vận đơn</label>
  <input type="text" id="trackingNum" placeholder="SF6093478359952">

  <label>4 số cuối số điện thoại (Tùy chọn)</label>
  <input type="text" id="phoneNum" placeholder="Nhập 4 số hoặc bỏ trống" maxlength="4">

  <label>Hãng vận chuyển</label>
  <div class="custom-select" id="customSelect">
    <div class="select-selected" id="selectedCarrierText" onclick="toggleDropdown()">Tự nhận diện</div>
    <div class="select-items select-hide" id="selectItems">
      <div class="search-box">
        <input type="text" id="carrierSearch" placeholder="🔍 Tìm hãng..." onkeyup="filterCarriers()" onclick="event.stopPropagation()">
      </div>
      <div class="option" onclick="selectOption('', 'Tự nhận diện')">Tự nhận diện</div>
    </div>
  </div>
  <input type="hidden" id="carrierCode" value="">
  
  <div id="customCarrierDiv" style="display: none; margin-top: 8px;">
    <input type="text" id="customCarrierCode" placeholder="Nhập mã hãng (VD: 100017)">
  </div>

  <button class="btn btn-primary" id="btnAdd" onclick="addTracking()">
    <span id="addIcon">➕</span>
    <span id="addText">Thêm & Tra cứu</span>
    <div class="spinner" id="addSpinner"></div>
  </button>
  <div class="toast" id="toastAdd"></div>
</div>

<!-- Cập nhật -->
<div class="card">
  <div class="card-title">🔄 Cập nhật toàn bộ bảng</div>

  <button class="btn btn-secondary" id="btnRegister" onclick="doRegister()">
    <span id="regIcon">📋</span>
    <span id="regText">Bước 1: Đăng ký mã mới</span>
    <div class="spinner spinner-dark" id="regSpinner"></div>
  </button>

  <p class="hint">↓ Sau bước 1, chờ 1–2 phút rồi bấm Bước 2</p>

  <button class="btn btn-primary" id="btnUpdate" onclick="doGetInfo()">
    <span id="updateIcon">🔄</span>
    <span id="updateText">Bước 2: Lấy trạng thái</span>
    <div class="spinner" id="updateSpinner"></div>
  </button>

  <div class="toast" id="toastUpdate"></div>
</div>

<script>
  window.onload = function() { 
    loadApiKey(); // Tải API Key khi mở
    loadCarrierList(); // Tải danh sách hãng
    
    // Bắt sự kiện nhấn phím Enter ở các ô nhập liệu
    var inputs = ['trackingNum', 'phoneNum', 'customCarrierCode'];
    inputs.forEach(function(id) {
      var el = document.getElementById(id);
      if (el) {
        el.addEventListener('keypress', function(e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            addTracking();
          }
        });
      }
    });
  };

  function loadApiKey() {
    google.script.run
      .withSuccessHandler(function(key) {
        if(key) document.getElementById('apiKeyInput').value = key;
      })
      .getApiKey();
  }

  function saveApiKey() {
    var key = document.getElementById('apiKeyInput').value.trim();
    if (!key) { showToast('toastKey', 'error', '⚠️ Vui lòng nhập API Key!'); return; }

    setBtnLoading('btnSaveKey', 'keySpinner', 'keyIcon', 'keyText', true, 'Đang lưu...');
    google.script.run
      .withSuccessHandler(function(r) {
        setBtnLoading('btnSaveKey', 'keySpinner', 'keyIcon', 'keyText', false, 'Lưu API Key');
        if (r.success) showToast('toastKey', 'success', '✅ ' + r.message);
      })
      .withFailureHandler(function(err) {
        setBtnLoading('btnSaveKey', 'keySpinner', 'keyIcon', 'keyText', false, 'Lưu API Key');
        showToast('toastKey', 'error', '❌ Lỗi: ' + err.message);
      })
      .saveApiKey(key);
  }

  function addTracking() {
    var num     = document.getElementById('trackingNum').value.trim();
    var phone   = document.getElementById('phoneNum').value.trim();
    var carrier = document.getElementById('carrierCode').value;

    if (carrier === 'custom') {
      carrier = document.getElementById('customCarrierCode').value.trim();
      if (!carrier || isNaN(carrier)) { showToast('toastAdd', 'error', '⚠️ Vui lòng nhập mã hãng hợp lệ (chỉ nhập số)!'); return; }
    }

    if (!num)                        { showToast('toastAdd', 'error', '⚠️ Nhập mã vận đơn!'); return; }
    if (phone && phone.length !== 4) { showToast('toastAdd', 'error', '⚠️ Nhập đúng 4 số cuối SĐT (hoặc bỏ trống)!'); return; }

    setBtnLoading('btnAdd', 'addSpinner', 'addIcon', 'addText', true, 'Đang xử lý...');
    showToast('toastAdd', 'info', '⏳ Đang lấy dữ liệu (Khoảng 5-10s)...');

    google.script.run
      .withSuccessHandler(function(r) {
        setBtnLoading('btnAdd', 'addSpinner', 'addIcon', 'addText', false, 'Thêm & Tra cứu');
        if (r.success) {
          showToast('toastAdd', 'success', r.message);
          document.getElementById('trackingNum').value = '';
          document.getElementById('phoneNum').value    = '';
          document.getElementById('trackingNum').focus();
        } else {
          showToast('toastAdd', 'error', r.message);
        }
      })
      .withFailureHandler(function(err) {
        setBtnLoading('btnAdd', 'addSpinner', 'addIcon', 'addText', false, 'Thêm & Tra cứu');
        showToast('toastAdd', 'error', '❌ ' + err.message);
      })
      .addAndTrackSingle(num, phone, carrier);
  }

  function doRegister() {
    setBtnLoading('btnRegister', 'regSpinner', 'regIcon', 'regText', true, 'Đang đăng ký...');
    google.script.run
      .withSuccessHandler(function(r) {
        setBtnLoading('btnRegister', 'regSpinner', 'regIcon', 'regText', false, 'Bước 1: Đăng ký mã mới');
        if (r.success) {
          showToast('toastUpdate', 'success', '✅ Đã đăng ký ' + r.count + ' mã! Chờ 1–2 phút rồi bấm Bước 2.');
        } else {
          showToast('toastUpdate', 'error', '❌ ' + r.message);
        }
      })
      .withFailureHandler(function(err) {
        setBtnLoading('btnRegister', 'regSpinner', 'regIcon', 'regText', false, 'Bước 1: Đăng ký mã mới');
        showToast('toastUpdate', 'error', '❌ ' + err.message);
      })
      .registerOnly();
  }

  function doGetInfo() {
    setBtnLoading('btnUpdate', 'updateSpinner', 'updateIcon', 'updateText', true, 'Đang lấy dữ liệu...');
    showToast('toastUpdate', 'info', '⏳ Đang xử lý...');
    google.script.run
      .withSuccessHandler(function(r) {
        setBtnLoading('btnUpdate', 'updateSpinner', 'updateIcon', 'updateText', false, 'Bước 2: Lấy trạng thái');
        if (r.success) {
          showToast('toastUpdate', 'success', '✅ Đã cập nhật ' + r.count + ' đơn hàng!');
        } else {
          showToast('toastUpdate', 'error', '❌ ' + r.message);
        }
      })
      .withFailureHandler(function(err) {
        setBtnLoading('btnUpdate', 'updateSpinner', 'updateIcon', 'updateText', false, 'Bước 2: Lấy trạng thái');
        showToast('toastUpdate', 'error', '❌ ' + err.message);
      })
      .getInfoOnly();
  }

  document.addEventListener('click', function(event) {
    if (!event.target.closest('.custom-select')) {
      var dropdown = document.getElementById('selectItems');
      if (dropdown && !dropdown.classList.contains('select-hide')) {
        dropdown.classList.add('select-hide');
      }
    }
  });

  function loadCarrierList() {
    google.script.run
      .withSuccessHandler(function(list) {
        var selectItems = document.getElementById('selectItems');
        selectItems.innerHTML = '';
        
        // Thêm ô tìm kiếm
        var searchBox = document.createElement('div');
        searchBox.className = 'search-box';
        searchBox.innerHTML = '<input type="text" id="carrierSearch" placeholder="🔍 Tìm hãng..." onkeyup="filterCarriers()" onclick="event.stopPropagation()">';
        selectItems.appendChild(searchBox);
        
        // Mục mặc định
        var optAuto = document.createElement('div');
        optAuto.className = 'option';
        optAuto.textContent = 'Tự nhận diện';
        optAuto.onclick = function() { selectOption('', 'Tự nhận diện'); };
        selectItems.appendChild(optAuto);
        
        // Render danh sách động từ Sheet
        for (var i = 0; i < list.length; i++) {
          var opt = document.createElement('div');
          opt.className = 'option';
          opt.textContent = list[i].name;
          (function(val, txt) { // Giữ scope biến
            opt.onclick = function() { selectOption(val, txt); };
          })(list[i].code, list[i].name);
          selectItems.appendChild(opt);
        }
        
        // Thêm mục tùy chỉnh ở cuối
        var optCustom = document.createElement('div');
        optCustom.className = 'option';
        optCustom.textContent = '➕ Khác (Nhập mã thủ công)...';
        optCustom.onclick = function() { selectOption('custom', '➕ Khác (Nhập mã thủ công)...'); };
        selectItems.appendChild(optCustom);
      })
      .getCarrierList();
  }

  function toggleDropdown() {
    var dropdown = document.getElementById('selectItems');
    dropdown.classList.toggle('select-hide');
    if (!dropdown.classList.contains('select-hide')) {
      document.getElementById('carrierSearch').focus();
    }
  }

  function selectOption(value, text) {
    document.getElementById('selectedCarrierText').textContent = text;
    document.getElementById('carrierCode').value = value;
    document.getElementById('selectItems').classList.add('select-hide');
    document.getElementById('carrierSearch').value = '';
    filterCarriers();
    toggleCustomCarrier();

    // Tự động chạy nếu đã nhập mã vận đơn (và không phải mục Nhập thủ công)
    var num = document.getElementById('trackingNum').value.trim();
    if (num && value !== 'custom') {
      addTracking();
    }
  }

  function filterCarriers() {
    var filter = document.getElementById('carrierSearch').value.toLowerCase();
    var options = document.getElementById('selectItems').getElementsByClassName('option');
    for (var i = 0; i < options.length; i++) {
      var txtValue = options[i].textContent || options[i].innerText;
      options[i].style.display = txtValue.toLowerCase().indexOf(filter) > -1 ? "" : "none";
    }
  }

  function toggleCustomCarrier() {
    var select = document.getElementById('carrierCode');
    var customDiv = document.getElementById('customCarrierDiv');
    customDiv.style.display = (select.value === 'custom') ? 'block' : 'none';
  }

  function setBtnLoading(btnId, spinnerId, iconId, textId, loading, text) {
    document.getElementById(btnId).disabled          = loading;
    document.getElementById(spinnerId).style.display = loading ? 'block' : 'none';
    document.getElementById(iconId).style.display    = loading ? 'none'  : 'inline';
    document.getElementById(textId).textContent      = text;
  }

  function showToast(id, type, msg) {
    var el = document.getElementById(id);
    el.className   = 'toast ' + type;
    el.textContent = msg;
    if (type !== 'info') {
      setTimeout(function() { el.style.display = 'none'; }, 5000);
    }
  }
</script>
</body>
</html>
